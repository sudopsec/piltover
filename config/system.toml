[system]
# Path to data directory where systtem data will be stored
data_dir = "data"
# Database connection string
database_connection_string = "sqlite://data/secrets/piltover.db"

# Note that it only makes sense to specify either both "rabbitmq_address" and "redis_address" or neither of them.
# If only one is specified - single-process gateway/worker setup will be used as a fallback.

# RabbitMQ address to use for sending rpc requests and other system internal messages between gateway and workers.
#  Should only be specified if running gateway and worker(s) in separate processes.
#rabbitmq_address = "amqp://guest:guest@localhost:5672"
# Redis address to use for storing worker results.
#  Should only be specified if running gateway and worker(s) in separate processes.
#redis_address = "redis://127.0.0.1:6379"

# Whether to enable @system bot. When enabled, it responds to /info command with instance info
#  (name, versions, some non-critical config options).
enable_system_bot = false

# Where all cached data (users, chats, messages, etc.) will be stored
[system.cache]
# Cache backend. Available backends: "memory", "redis", "memcached", "none".
#  - "memory" - keeps cache in Python dict, not persistent between restarts.
#  - "redis", "memcached" - keeps cache in Redis/Memcached, requires it to be installed and running, persistent between restarts.
#  - "none" - disable caching completely.
backend = "memory"
# Cache endpoint. Only for "redis" and "memcached" cache types.
#endpoint = "127.0.0.1"
# Cache port. Only for "redis" and "memcached" cache types.
#port = 6379
# Cache database number. Only for "redis" cache type.
#db = "0"

# Debug tracing.
[system.debug_tracing]
# Tracing backend. Available backends: console, zipkin, noop.
backend = "noop"

# Mediasoup SFU for group voice/video calls.
# Win10 + Telegram on Windows: run mediasoup-server/start-windows.ps1 (NOT WSL).
# Worker in WSL: api_url = "windows-host" (auto-resolves Windows host IP).
# SFU in WSL only: api_url = "http://127.0.0.1:3200" + start-win10-webrtc.ps1 relay.
# HTTP Bot API (https://core.telegram.org/bots/api)
[system.bot_api]
enabled = true
host = "127.0.0.1"
port = 8081

[system.group_call_sfu]
enabled = true
api_url = "http://127.0.0.1:3200"
public_ip = "127.0.0.1"
rtc_port = 10000
# Zipkin address where to send all traces.
#zipkin_address = "http://127.0.0.1:9411/api/v2/spans"
