[app]
# List of available datacenters. May all have same addresses. Telegram uses dcs 1-5 for prod, 1-3 for test.
# Note that this is not addresses to which gateway will be bound, but rather list of addresses that will be sent to clients.
dc_list = [
    { id = 1, addresses = [ { host = "127.0.0.1", port = 4430 } ] },
    { id = 2, addresses = [ { host = "127.0.0.1", port = 4430 } ] },
    { id = 3, addresses = [ { host = "127.0.0.1", port = 4430 } ] },
    { id = 4, addresses = [ { host = "127.0.0.1", port = 4430 } ] },
    { id = 5, addresses = [ { host = "127.0.0.1", port = 4430 } ] },
]
# Id of this datacenter.
this_dc = 2
# Instance name. Will be used in system messages and for system user's name.
name = "Piltover"
# Username of system user. System user is a user with id 777000, all login codes and system messages will be sent there.
system_user_username = "piltover"

# Maximum number of users for basic groups. In such groups each message will be stored for each user SEPARATELY,
#  so it makes sense to keep this number low. Telegram's limit is 200.
basic_group_member_limit = 50
# Maximum number of users for supergroups and channels.
super_group_member_limit = 1000
# Time (in seconds) after which editing of message (in all chats except for saved messages) will be forbidden.
edit_time_limit = 172800  # 48 * 60 * 60
# Maximum length of text messages (in characters).
max_message_length = 4096
# Maximum length of media captions (in characters).
max_caption_length = 2048
# Maximum number of channels users may be participant of.
channels_per_user_limit = 100
# Maximum number of public channels that user can own.
public_channels_limit = 10
# Maximum number of pinned dialogs.
pinned_dialogs_limit = 5
# Maximum number of faved stickers.
faved_stickers_limit = 15
# Maximum number of saved gifs.
saved_gifs_limit = 100
# Maximum number of recent stickers.
recent_stickers_limit = 25
# Maximum number of unique reactions on specific message.
reactions_unique_max = 11
# Maximum length of user's "about" field (in characters).
user_bio_limit = 100
# Maximum amount of admins in basic group
basic_group_admin_limit = 10
# Maximum amount of admins in channels and supergroups
channel_admin_limit = 25

# Key used to sign access hashes, file references, etc.
#  Must be changed from default one and kept in secret!
#  If leaked - will allow users to access some data (files, private user profiles, etc.) even after expiration.
hmac_key = "Gt1BNkYR0JGkJIntZWEBwub8UAZuNiqoXvKRQ6HWJ40="
# Time (in minutes) after which file references will be expired and must be re-fetched.
#  Recommended value is a couple of hours.
file_ref_expire_minutes = 240  # 60 * 4
# Time (in minutes) after which contact tokens (which are used for sharing profile when user does not have public username)
#  will be expired and must be re-fetched.
#  Recommended value is a 5-60 minutes.
contact_token_expire_seconds = 1800  # 60 * 30
# Time (in seconds) for user to wait for two-factor authentication password reset.
srp_password_reset_wait_seconds = 604800  # 86400 * 7
# Time (in seconds), before scheduled messages will be sent immediately instead of queued up for sending.
scheduled_instant_send_threshold = 30
# Time (in seconds) for user to wait deletion of account (when no 2fa password is set, or it is forgotten)
account_delete_wait_seconds = 604800  # 86400 * 7
# Maximum amount of bots single user can create
max_bots_per_user = 24

